<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#f1c40f"/>
    </linearGradient>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
  </defs>
  
  <rect width="1100" height="700" fill="#1a1a2e"/>
  
  <text x="550" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">项目研发时间线</text>
  <text x="550" y="48" text-anchor="middle" font-size="10" fill="#888">Project Development Timeline (10周)</text>
  <line x1="30" y1="58" x2="1070" y2="58" stroke="#333" stroke-width="1"/>
  
  <!-- 时间轴 -->
  <line x1="80" y1="620" x2="900" y2="620" stroke="#555" stroke-width="3"/>
  
  <!-- 时间刻度 -->
  <text x="80" y="640" text-anchor="middle" font-size="8" fill="#888">W1</text>
  <text x="162" y="640" text-anchor="middle" font-size="8" fill="#888">W2</text>
  <text x="244" y="640" text-anchor="middle" font-size="8" fill="#888">W3</text>
  <text x="326" y="640" text-anchor="middle" font-size="8" fill="#888">W4</text>
  <text x="408" y="640" text-anchor="middle" font-size="8" fill="#888">W5</text>
  <text x="490" y="640" text-anchor="middle" font-size="8" fill="#888">W6</text>
  <text x="572" y="640" text-anchor="middle" font-size="8" fill="#888">W7</text>
  <text x="654" y="640" text-anchor="middle" font-size="8" fill="#888">W8</text>
  <text x="736" y="640" text-anchor="middle" font-size="8" fill="#888">W9</text>
  <text x="818" y="640" text-anchor="middle" font-size="8" fill="#888">W10</text>
  <text x="900" y="640" text-anchor="middle" font-size="8" fill="#888">W11</text>
  
  <!-- 阶段1: 需求分析 (W1-W2) -->
  <rect x="50" y="70" width="180" height="55" rx="6" fill="url(#grad1)"/>
  <text x="140" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">需求分析</text>
  <text x="140" y="108" text-anchor="middle" font-size="9" fill="#eee">W1-W2</text>
  
  <!-- 阶段2: 项目立项 (W2) -->
  <rect x="130" y="140" width="100" height="50" rx="6" fill="url(#grad2)"/>
  <text x="180" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">立项</text>
  <text x="180" y="178" text-anchor="middle" font-size="9" fill="#eee">W2</text>
  
  <!-- 阶段3: 设计阶段 (W2-W4) -->
  <rect x="180" y="205" width="220" height="55" rx="6" fill="url(#grad3)"/>
  <text x="290" y="225" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">设计阶段</text>
  <text x="290" y="243" text-anchor="middle" font-size="9" fill="#eee">W2-W4</text>
  
  <!-- 阶段4: 开发阶段 (W3-W8) -->
  <rect x="220" y="275" width="400" height="55" rx="6" fill="url(#grad4)"/>
  <text x="420" y="295" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">开发阶段</text>
  <text x="420" y="313" text-anchor="middle" font-size="9" fill="#eee">W3-W8</text>
  
  <!-- 阶段5: 测试阶段 (W6-W9) -->
  <rect x="420" y="345" width="240" height="55" rx="6" fill="url(#grad5)"/>
  <text x="540" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">测试阶段</text>
  <text x="540" y="383" text-anchor="middle" font-size="9" fill="#eee">W6-W9</text>
  
  <!-- 阶段6: 部署发布 (W8-W9) -->
  <rect x="560" y="415" width="140" height="50" rx="6" fill="url(#grad6)"/>
  <text x="630" y="435" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">部署发布</text>
  <text x="630" y="453" text-anchor="middle" font-size="9" fill="#eee">W8-W9</text>
  
  <!-- 阶段7: 运维支持 (W9-W11) -->
  <rect x="600" y="480" width="180" height="50" rx="6" fill="url(#grad7)"/>
  <text x="690" y="500" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">运维支持</text>
  <text x="690" y="518" text-anchor="middle" font-size="9" fill="#eee">W9-W11</text>
  
  <!-- 里程碑节点 -->
  <circle cx="140" cy="620" r="5" fill="#3498db"/>
  <circle cx="180" cy="620" r="5" fill="#2ecc71"/>
  <circle cx="290" cy="620" r="5" fill="#e67e22"/>
  <circle cx="420" cy="620" r="5" fill="#e74c3c"/>
  <circle cx="540" cy="620" r="5" fill="#9b59b6"/>
  <circle cx="630" cy="620" r="5" fill="#1abc9c"/>
  <circle cx="690" cy="620" r="5" fill="#f39c12"/>
  <circle cx="820" cy="620" r="5" fill="#00cec9"/>
  
  <!-- 右侧说明区域 -->
  <rect x="930" y="70" width="150" height="280" rx="8" fill="#16213e" stroke="#333"/>
  <text x="1005" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">阶段说明</text>
  
  <rect x="945" y="105" width="10" height="10" rx="2" fill="#3498db"/>
  <text x="962" y="114" font-size="8" fill="#aaa">需求调研、评审</text>
  
  <rect x="945" y="122" width="10" height="10" rx="2" fill="#2ecc71"/>
  <text x="962" y="131" font-size="8" fill="#aaa">立项审批、启动</text>
  
  <rect x="945" y="139" width="10" height="10" rx="2" fill="#e67e22"/>
  <text x="962" y="148" font-size="8" fill="#aaa">架构、详细设计</text>
  
  <rect x="945" y="156" width="10" height="10" rx="2" fill="#e74c3c"/>
  <text x="962" y="165" font-size="8" fill="#aaa">编码、单元测试</text>
  
  <rect x="945" y="173" width="10" height="10" rx="2" fill="#9b59b6"/>
  <text x="962" y="182" font-size="8" fill="#aaa">功能、性能测试</text>
  
  <rect x="945" y="190" width="10" height="10" rx="2" fill="#1abc9c"/>
  <text x="962" y="199" font-size="8" fill="#aaa">生产环境部署</text>
  
  <rect x="945" y="207" width="10" height="10" rx="2" fill="#f39c12"/>
  <text x="962" y="216" font-size="8" fill="#aaa">监控、故障处理</text>
  
  <rect x="945" y="224" width="10" height="10" rx="2" fill="#00cec9"/>
  <text x="962" y="233" font-size="8" fill="#aaa">收集反馈、迭代</text>
  
  <!-- 注意事项 -->
  <rect x="930" y="365" width="150" height="120" rx="8" fill="#16213e" stroke="#333"/>
  <text x="1005" y="385" text-anchor="middle" font-size="11" font-weight="bold" fill="#e74c3c">注意事项</text>
  <text x="940" y="405" font-size="8" fill="#aaa">1. 各阶段可并行</text>
  <text x="940" y="420" font-size="8" fill="#aaa">2. 迭代周期可调整</text>
  <text x="940" y="435" font-size="8" fill="#aaa">3. 里程碑需评审</text>
  <text x="940" y="450" font-size="8" fill="#aaa">4. 交付物需归档</text>
  <text x="940" y="465" font-size="8" fill="#aaa">5. 风险需跟踪</text>
  
  <!-- 关键交付物 -->
  <rect x="930" y="500" width="150" height="180" rx="8" fill="#16213e" stroke="#333"/>
  <text x="1005" y="520" text-anchor="middle" font-size="11" font-weight="bold" fill="#2ecc71">关键交付物</text>
  <text x="940" y="540" font-size="8" fill="#aaa">- 需求规格说明书</text>
  <text x="940" y="555" font-size="8" fill="#aaa">- 技术设计方案</text>
  <text x="940" y="570" font-size="8" fill="#aaa">- 源代码仓库</text>
  <text x="940" y="585" font-size="8" fill="#aaa">- 测试报告</text>
  <text x="940" y="600" font-size="8" fill="#aaa">- 部署文档</text>
  <text x="940" y="615" font-size="8" fill="#aaa">- 项目总结报告</text>
  <text x="940" y="630" font-size="8" fill="#aaa">- 运维手册</text>
  <text x="940" y="645" font-size="8" fill="#aaa">- 用户使用手册</text>
  
  <!-- 图例 -->
  <rect x="50" y="550" width="300" height="55" rx="6" fill="#16213e" stroke="#333"/>
  <text x="70" y="570" font-size="10" font-weight="bold" fill="#fff">图例</text>
  <rect x="70" y="580" width="15" height="8" rx="1" fill="none" stroke="#3498db" stroke-width="1"/>
  <text x="90" y="587" font-size="8" fill="#aaa">需求</text>
  <rect x="120" y="580" width="15" height="8" rx="1" fill="none" stroke="#2ecc71" stroke-width="1"/>
  <text x="140" y="587" font-size="8" fill="#aaa">立项</text>
  <rect x="170" y="580" width="15" height="8" rx="1" fill="none" stroke="#e67e22" stroke-width="1"/>
  <text x="190" y="587" font-size="8" fill="#aaa">设计</text>
  <rect x="220" y="580" width="15" height="8" rx="1" fill="none" stroke="#e74c3c" stroke-width="1"/>
  <text x="240" y="587" font-size="8" fill="#aaa">开发</text>
  <rect x="270" y="580" width="15" height="8" rx="1" fill="none" stroke="#9b59b6" stroke-width="1"/>
  <text x="290" y="587" font-size="8" fill="#aaa">测试</text>
  <rect x="320" y="580" width="15" height="8" rx="1" fill="none" stroke="#1abc9c" stroke-width="1"/>
  <text x="340" y="587" font-size="8" fill="#aaa">部署</text>
</svg>