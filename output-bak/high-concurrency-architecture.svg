<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <rect width="1200" height="900" fill="url(#bgGrad)"/>
  
  <text x="600" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b" text-anchor="middle">High Concurrency Architecture</text>
  
  <!-- Layer Labels -->
  <text x="30" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">CDN &amp; Edge</text>
  <text x="30" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Load Balancing</text>
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">API Gateway</text>
  <text x="30" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Business Services</text>
  <text x="30" y="550" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Cache &amp; MQ</text>
  <text x="30" y="700" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Data Storage</text>
  <text x="30" y="820" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#64748b">Monitoring</text>
  
  <!-- CDN Layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="65" width="180" height="50" rx="8" fill="url(#blueGrad)"/>
    <text x="210" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Global CDN</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="65" width="180" height="50" rx="8" fill="url(#blueGrad)"/>
    <text x="410" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DNS Server</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="65" width="180" height="50" rx="8" fill="url(#blueGrad)"/>
    <text x="610" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">WAF Firewall</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="720" y="65" width="180" height="50" rx="8" fill="url(#blueGrad)"/>
    <text x="810" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">DDoS Protection</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="65" width="160" height="50" rx="8" fill="url(#blueGrad)"/>
    <text x="1000" y="97" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">SSL/TLS</text>
  </g>
  
  <!-- Load Balancing Layer -->
  <g filter="url(#shadow)">
    <rect x="320" y="165" width="200" height="50" rx="8" fill="url(#greenGrad)"/>
    <text x="420" y="197" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Nginx L7 LB</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="165" width="200" height="50" rx="8" fill="url(#greenGrad)"/>
    <text x="660" y="197" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">HAProxy</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="165" width="200" height="50" rx="8" fill="url(#greenGrad)"/>
    <text x="900" y="197" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">VIP / Keepalived</text>
  </g>
  
  <!-- API Gateway Layer -->
  <g filter="url(#shadow)">
    <rect x="320" y="265" width="280" height="50" rx="8" fill="url(#orangeGrad)"/>
    <text x="460" y="297" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">API Gateway (Kong/Zuul)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="265" width="200" height="50" rx="8" fill="url(#orangeGrad)"/>
    <text x="740" y="297" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Authentication</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="880" y="265" width="160" height="50" rx="8" fill="url(#orangeGrad)"/>
    <text x="960" y="297" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Rate Limit</text>
  </g>
  
  <!-- Business Services Layer -->
  <g filter="url(#shadow)">
    <rect x="160" y="365" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="250" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">User Service</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="365" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="450" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Order Service</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="365" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="650" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Payment Service</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="760" y="365" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="850" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Product Service</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="365" width="150" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="1035" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Search</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="160" y="435" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="250" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Notification</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="360" y="435" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="450" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Inventory</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="435" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="650" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Recommendation</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="760" y="435" width="180" height="55" rx="8" fill="url(#purpleGrad)"/>
    <text x="850" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Analytics</text>
  </g>
  
  <!-- Service Mesh -->
  <g filter="url(#shadow)">
    <rect x="960" y="435" width="150" height="55" rx="8" fill="#6366f1"/>
    <text x="1035" y="470" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Service Mesh</text>
  </g>
  
  <!-- Cache & MQ Layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="515" width="160" height="55" rx="8" fill="#0ea5e9"/>
    <text x="200" y="547" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Redis Cluster</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="515" width="160" height="55" rx="8" fill="#0ea5e9"/>
    <text x="380" y="547" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Memcached</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="480" y="515" width="160" height="55" rx="8" fill="#f59e0b"/>
    <text x="560" y="547" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Kafka</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="515" width="160" height="55" rx="8" fill="#f59e0b"/>
    <text x="740" y="547" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RabbitMQ</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="840" y="515" width="160" height="55" rx="8" fill="#f59e0b"/>
    <text x="920" y="547" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RocketMQ</text>
  </g>
  
  <!-- Data Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="120" y="665" width="180" height="55" rx="8" fill="url(#redGrad)"/>
    <text x="210" y="697" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MySQL Cluster</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="665" width="180" height="55" rx="8" fill="url(#redGrad)"/>
    <text x="410" y="697" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">PostgreSQL</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="665" width="180" height="55" rx="8" fill="#10b981"/>
    <text x="610" y="697" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">MongoDB</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="720" y="665" width="180" height="55" rx="8" fill="#06b6d4"/>
    <text x="810" y="697" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Elasticsearch</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="665" width="160" height="55" rx="8" fill="#8b5cf6"/>
    <text x="1000" y="697" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">HBase</text>
  </g>
  
  <!-- Additional Storage -->
  <g filter="url(#shadow)">
    <rect x="120" y="735" width="180" height="45" rx="8" fill="#64748b"/>
    <text x="210" y="763" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Object Storage</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="320" y="735" width="180" height="45" rx="8" fill="#64748b"/>
    <text x="410" y="763" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">File Storage</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="735" width="180" height="45" rx="8" fill="#64748b"/>
    <text x="610" y="763" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Distributed FS</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="720" y="735" width="180" height="45" rx="8" fill="#64748b"/>
    <text x="810" y="763" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Data Warehouse</text>
  </g>
  
  <!-- Monitoring Layer -->
  <g filter="url(#shadow)">
    <rect x="200" y="795" width="160" height="50" rx="8" fill="#ec4899"/>
    <text x="280" y="827" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Prometheus</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="380" y="795" width="160" height="50" rx="8" fill="#ec4899"/>
    <text x="460" y="827" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Grafana</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="560" y="795" width="160" height="50" rx="8" fill="#ec4899"/>
    <text x="640" y="827" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">ELK Stack</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="795" width="160" height="50" rx="8" fill="#ec4899"/>
    <text x="820" y="827" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">SkyWalking</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="920" y="795" width="160" height="50" rx="8" fill="#ec4899"/>
    <text x="1000" y="827" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Jaeger</text>
  </g>
  
  <!-- Connecting Lines -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <!-- CDN to LB -->
    <line x1="210" y1="115" x2="420" y2="165"/>
    <line x1="610" y1="115" x2="660" y2="165"/>
    <line x1="810" y1="115" x2="900" y2="165"/>
    
    <!-- LB to Gateway -->
    <line x1="420" y1="215" x2="460" y2="265"/>
    <line x1="660" y1="215" x2="740" y2="265"/>
    <line x1="900" y1="215" x2="960" y2="265"/>
    
    <!-- Gateway to Services -->
    <line x1="460" y1="315" x2="250" y2="365"/>
    <line x1="740" y1="315" x2="450" y2="365"/>
    <line x1="960" y1="315" x2="650" y2="365"/>
    
    <!-- Services to Cache/MQ -->
    <line x1="250" y1="420" x2="200" y2="515"/>
    <line x1="450" y1="420" x2="380" y2="515"/>
    <line x1="850" y1="420" x2="560" y2="515"/>
    
    <!-- Services to Storage -->
    <line x1="250" y1="490" x2="210" y2="665"/>
    <line x1="650" y1="490" x2="410" y2="665"/>
    <line x1="850" y1="490" x2="810" y2="665"/>
    
    <!-- Cache/MQ to Storage -->
    <line x1="200" y1="570" x2="210" y2="665"/>
    <line x1="560" y1="570" x2="610" y2="665"/>
    
    <!-- Services to Monitoring -->
    <line x1="250" y1="490" x2="280" y2="795"/>
    <line x1="850" y1="490" x2="820" y2="795"/>
  </g>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>
  
  <!-- Traffic Flow Indicators -->
  <g fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">
    <text x="530" y="145">Traffic Flow</text>
  </g>
</svg>