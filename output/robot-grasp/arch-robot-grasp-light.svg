<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="900" height="600" fill="#f8f9fa"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#333333">机器人抓取系统架构图</text>
  <line x1="30" y1="42" x2="870" y2="42" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- 感知层 -->
  <text x="50" y="60" font-size="12" font-weight="bold" fill="#3498db">① 感知层</text>
  <rect x="50" y="75" width="800" height="55" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="85" width="90" height="35" rx="5" fill="#3498db"/>
  <text x="115" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">RGB-D相机</text>
  <text x="115" y="115" text-anchor="middle" font-size="7" fill="#ffffff">深度获取</text>
  
  <rect x="175" y="85" width="90" height="35" rx="5" fill="#3498db"/>
  <text x="220" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">激光雷达</text>
  <text x="220" y="115" text-anchor="middle" font-size="7" fill="#ffffff">距离测量</text>
  
  <rect x="280" y="85" width="90" height="35" rx="5" fill="#3498db"/>
  <text x="325" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">力传感器</text>
  <text x="325" y="115" text-anchor="middle" font-size="7" fill="#ffffff">触觉反馈</text>
  
  <rect x="385" y="85" width="90" height="35" rx="5" fill="#3498db"/>
  <text x="430" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">IMU</text>
  <text x="430" y="115" text-anchor="middle" font-size="7" fill="#ffffff">姿态检测</text>
  
  <rect x="490" y="85" width="90" height="35" rx="5" fill="#2ecc71"/>
  <text x="535" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">视觉编码</text>
  <text x="535" y="115" text-anchor="middle" font-size="7" fill="#ffffff">特征提取</text>
  
  <rect x="595" y="85" width="90" height="35" rx="5" fill="#9b59b6"/>
  <text x="640" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">点云处理</text>
  <text x="640" y="115" text-anchor="middle" font-size="7" fill="#ffffff">PCL</text>
  
  <rect x="700" y="85" width="130" height="35" rx="5" fill="#e67e22"/>
  <text x="765" y="102" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">ROS通信</text>
  <text x="765" y="115" text-anchor="middle" font-size="7" fill="#ffffff">数据同步</text>
  
  <!-- 神经网络层 -->
  <text x="50" y="150" font-size="12" font-weight="bold" fill="#2ecc71">② 神经网络层</text>
  <rect x="50" y="165" width="800" height="55" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="175" width="110" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="125" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">目标检测</text>
  <text x="125" y="205" text-anchor="middle" font-size="7" fill="#666666">YOLO/Faster R-CNN</text>
  
  <rect x="195" y="175" width="110" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="250" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">语义分割</text>
  <text x="250" y="205" text-anchor="middle" font-size="7" fill="#666666">Mask R-CNN</text>
  
  <rect x="320" y="175" width="110" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="375" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">抓取点检测</text>
  <text x="375" y="205" text-anchor="middle" font-size="7" fill="#666666">GraspNet</text>
  
  <rect x="445" y="175" width="110" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="500" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">位姿估计</text>
  <text x="500" y="205" text-anchor="middle" font-size="7" fill="#666666">PoseNet</text>
  
  <rect x="570" y="175" width="110" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="625" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">强化学习</text>
  <text x="625" y="205" text-anchor="middle" font-size="7" fill="#666666">DQN/PPO</text>
  
  <rect x="695" y="175" width="130" height="35" rx="5" fill="#ffffff" stroke="#2ecc71" stroke-width="2"/>
  <text x="760" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">图像生成</text>
  <text x="760" y="205" text-anchor="middle" font-size="7" fill="#666666">GAN/VAE</text>
  
  <!-- 决策层 -->
  <text x="50" y="240" font-size="12" font-weight="bold" fill="#e67e22">③ 决策层</text>
  <rect x="50" y="255" width="800" height="55" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="265" width="110" height="35" rx="5" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="125" y="282" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">运动规划</text>
  <text x="125" y="295" text-anchor="middle" font-size="7" fill="#666666">RRT/PRM/OMPL</text>
  
  <rect x="195" y="265" width="110" height="35" rx="5" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="250" y="282" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">抓取策略</text>
  <text x="250" y="295" text-anchor="middle" font-size="7" fill="#666666">Q-Learning</text>
  
  <rect x="320" y="265" width="110" height="35" rx="5" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="375" y="282" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">轨迹优化</text>
  <text x="375" y="295" text-anchor="middle" font-size="7" fill="#666666">MPC</text>
  
  <rect x="445" y="265" width="110" height="35" rx="5" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
  <text x="500" y="282" text-anchor="middle" font-size="9" font-weight="bold" fill="#333333">控制器</text>
  <text x="500" y="295" text-anchor="middle" font-size="7" fill="#666666">PID/滑模控制</text>
  
  <!-- 执行层 -->
  <text x="50" y="330" font-size="12" font-weight="bold" fill="#e74c3c">④ 执行层</text>
  <rect x="50" y="345" width="800" height="50" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="355" width="100" height="30" rx="5" fill="#e74c3c"/>
  <text x="120" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">机械臂</text>
  
  <rect x="185" y="355" width="100" height="30" rx="5" fill="#e74c3c"/>
  <text x="235" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">夹爪/吸盘</text>
  
  <rect x="300" y="355" width="100" height="30" rx="5" fill="#e74c3c"/>
  <text x="350" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">移动底盘</text>
  
  <rect x="415" y="355" width="100" height="30" rx="5" fill="#e74c3c"/>
  <text x="465" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#ffffff">末端执行器</text>
  
  <!-- 数据层 -->
  <text x="50" y="415" font-size="12" font-weight="bold" fill="#95a5a6">⑤ 数据层</text>
  <rect x="50" y="430" width="800" height="50" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="70" y="440" width="90" height="30" rx="5" fill="#95a5a6"/>
  <text x="115" y="457" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Redis</text>
  <text x="115" y="467" text-anchor="middle" font-size="7" fill="#ffffff">实时数据</text>
  
  <rect x="175" y="440" width="90" height="30" rx="5" fill="#95a5a6"/>
  <text x="220" y="457" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">MySQL</text>
  <text x="220" y="467" text-anchor="middle" font-size="7" fill="#ffffff">历史数据</text>
  
  <rect x="280" y="440" width="100" height="30" rx="5" fill="#95a5a6"/>
  <text x="330" y="457" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">模型仓库</text>
  <text x="330" y="467" text-anchor="middle" font-size="7" fill="#ffffff">PyTorch</text>
  
  <rect x="395" y="440" width="100" height="30" rx="5" fill="#95a5a6"/>
  <text x="445" y="457" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">点云存储</text>
  <text x="445" y="467" text-anchor="middle" font-size="7" fill="#ffffff">PCL</text>
  
  <!-- 底部说明 -->
  <rect x="50" y="495" width="350" height="50" rx="5" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="225" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#333333">数据流向: 感知 → 神经网络 → 决策 → 执行</text>
  <text x="225" y="532" text-anchor="middle" font-size="9" fill="#666666">闭环反馈: 传感器数据实时回传调节</text>
  
  <rect x="420" y="495" width="430" height="50" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="635" y="515" text-anchor="middle" font-size="10" font-weight="bold" fill="#9b59b6">核心技术栈</text>
  <text x="510" y="532" font-size="9" fill="#333333">● 感知: OpenCV, PCL, ROS</text>
  <text x="640" y="532" font-size="9" fill="#333333">● 深度学习: PyTorch, TensorFlow</text>
  <text x="770" y="532" font-size="9" fill="#333333">● 控制: MoveIt, OMPL</text>
</svg>