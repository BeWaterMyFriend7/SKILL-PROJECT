<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#666666"/>
    </marker>
  </defs>
  <rect width="900" height="600" fill="#1a1a2e"/>
  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">机器人抓取物体流程图</text>
  <line x1="30" y1="42" x2="870" y2="42" stroke="#333333" stroke-width="1"/>
  
  <!-- 第1行节点 -->
  <g transform="translate(50, 60)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#3498db" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#3498db"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1. 图像采集</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">相机/RGB-D</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">传感器数据获取</text>
  </g>
  <line x1="210" y1="100" x2="240" y2="100" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(240, 60)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#3498db" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#3498db"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2. 图像预处理</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">去噪/增强/归一化</text>
  </g>
  <line x1="400" y1="100" x2="430" y2="100" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(430, 60)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#2ecc71" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#2ecc71"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3. 目标检测</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">CNN/YOLO神经网络</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">目标识别与定位</text>
  </g>
  <line x1="590" y1="100" x2="620" y2="100" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(620, 60)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#e67e22" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#e67e22"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">4. 抓取点检测</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">GraspNet/GGCNN</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">最优抓取位姿计算</text>
  </g>
  <line x1="700" y1="140" x2="700" y2="180" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 第2行节点 -->
  <g transform="translate(620, 180)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#9b59b6" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#9b59b6"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">5. 运动规划</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">RRT/PRM路径规划</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">机械臂逆运动学</text>
  </g>
  <line x1="620" y1="220" x2="590" y2="220" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(430, 180)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#e74c3c" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#e74c3c"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">6. 抓取执行</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">机械臂控制</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">夹爪闭合抓取</text>
  </g>
  <line x1="430" y1="220" x2="400" y2="220" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(240, 180)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#1abc9c" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#1abc9c"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">7. 质量检测</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">力反馈检测</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">抓取成功判断</text>
  </g>
  <line x1="320" y1="260" x2="320" y2="300" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <g transform="translate(240, 300)">
    <rect width="160" height="80" rx="8" fill="#16213e" stroke="#f39c12" stroke-width="2"/>
    <rect width="160" height="22" rx="8" fill="#f39c12"/>
    <text x="80" y="16" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">8. 放置完成</text>
    <text x="80" y="45" text-anchor="middle" font-size="10" fill="#aaaaaa">目标放置</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#888888">任务完成</text>
  </g>
  
  <!-- 底部说明框 -->
  <text x="50" y="420" font-size="11" font-weight="bold" fill="#2ecc71">神经网络模块</text>
  <rect x="50" y="430" width="220" height="80" rx="5" fill="#16213e" stroke="#333333" stroke-width="1"/>
  <text x="60" y="450" font-size="10" fill="#aaaaaa">● 目标检测: YOLO, Faster R-CNN</text>
  <text x="60" y="470" font-size="10" fill="#aaaaaa">● 语义分割: Mask R-CNN</text>
  <text x="60" y="490" font-size="10" fill="#aaaaaa">● 抓取检测: GraspNet, GGCNN</text>
  
  <text x="300" y="420" font-size="11" font-weight="bold" fill="#e67e22">核心技术</text>
  <rect x="300" y="430" width="220" height="80" rx="5" fill="#16213e" stroke="#333333" stroke-width="1"/>
  <text x="310" y="450" font-size="10" fill="#aaaaaa">● 深度学习: PyTorch, TF</text>
  <text x="310" y="470" font-size="10" fill="#aaaaaa">● 运动规划: RRT, PRM</text>
  <text x="310" y="490" font-size="10" fill="#aaaaaa">● 强化学习: DQN, PPO</text>
  
  <text x="550" y="420" font-size="11" font-weight="bold" fill="#3498db">数据流程</text>
  <rect x="550" y="430" width="280" height="80" rx="5" fill="#16213e" stroke="#333333" stroke-width="1"/>
  <text x="690" y="455" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">感知 → 检测 → 规划 → 执行 → 反馈</text>
  <text x="690" y="478" text-anchor="middle" font-size="10" fill="#888888">核心: 视觉感知 + 深度学习 + 运动控制</text>
  <text x="690" y="498" text-anchor="middle" font-size="10" fill="#888888">闭环: 传感器反馈 + 在线调整</text>
</svg>