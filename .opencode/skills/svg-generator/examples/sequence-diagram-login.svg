<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <!-- 箭头标记 - 统一大小 -->
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#999999"/>
    </marker>
    <marker id="arrowBlue" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="480" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">用户登录时序图</text>
  
  <!-- 生命线 - 等距分布 -->
  <line x1="150" y1="80" x2="150" y2="420" stroke="#999999" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="150" y="60" text-anchor="middle" fill="#333333" font-size="14" font-weight="bold">用户界面</text>
  
  <line x1="360" y1="80" x2="360" y2="420" stroke="#999999" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="360" y="60" text-anchor="middle" fill="#333333" font-size="14" font-weight="bold">认证服务</text>
  
  <line x1="570" y1="80" x2="570" y2="420" stroke="#999999" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="570" y="60" text-anchor="middle" fill="#333333" font-size="14" font-weight="bold">数据库</text>
  
  <!-- 激活条 - 顶部对齐消息起点 -->
  <rect x="135" y="100" width="30" height="50" fill="#e3f2fd" stroke="#3498db" stroke-width="2"/>
  <rect x="345" y="165" width="30" height="80" fill="#e8f5e9" stroke="#2ecc71" stroke-width="2"/>
  <rect x="555" y="235" width="30" height="60" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
  
  <!-- 消息1: 用户点击登录 -->
  <line x1="175" y1="125" x2="345" y2="125" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="260" y="110" text-anchor="middle" fill="#333333" font-size="11">login(username, password)</text>
  
  <!-- 消息2: 验证凭证 - 在消息1下方 -->
  <line x1="375" y1="190" x2="545" y2="190" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="460" y="175" text-anchor="middle" fill="#333333" font-size="11">validateCredentials()</text>
  
  <!-- 消息3: 数据库查询 - 水平返回 -->
  <line x1="555" y1="235" x2="555" y2="265" stroke="#999999" stroke-width="2"/>
  <line x1="555" y1="265" x2="375" y2="265" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="450" y="308" text-anchor="middle" fill="#666666" font-size="10">SELECT * FROM users WHERE username=?</text>
  
  <!-- 消息4: 验证密码 - 在返回消息下方 -->
  <line x1="375" y1="310" x2="545" y2="310" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="460" y="295" text-anchor="middle" fill="#333333" font-size="11">verifyPassword()</text>
  
  <!-- 消息5: 返回结果 - 水平返回 -->
  <line x1="555" y1="355" x2="375" y2="355" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="450" y="380" text-anchor="middle" fill="#666666" font-size="10">返回验证结果</text>
  
  <!-- 消息6: 返回登录结果 - 水平返回 -->
  <line x1="345" y1="400" x2="175" y2="400" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="260" y="430" text-anchor="middle" fill="#666666" font-size="10">登录成功/失败</text>
  
  <!-- 激活条结束 -->
  <rect x="135" y="165" width="30" height="5" fill="#3498db"/>
  <rect x="345" y="255" width="30" height="5" fill="#2ecc71"/>
  <rect x="555" y="300" width="30" height="5" fill="#e67e22"/>
</svg>