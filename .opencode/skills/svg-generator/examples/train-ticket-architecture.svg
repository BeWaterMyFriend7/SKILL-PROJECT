<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#999999"/>
    </marker>
  </defs>
  
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <text x="600" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#333333">火车票订票系统 - 分层架构图</text>
  
  <!-- ========== 第1层：表现层 ========== -->
  <g>
    <text x="100" y="70" font-size="16" font-weight="bold" fill="#3498db">① 表现层 (Presentation Layer)</text>
    <rect x="100" y="80" width="1000" height="80" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    
    <g transform="translate(120, 95)">
      <rect x="0" y="0" width="160" height="50" rx="6" fill="#3498db" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Web 前端</text>
    </g>
    
    <g transform="translate(320, 95)">
      <rect x="0" y="0" width="160" height="50" rx="6" fill="#9b59b6" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">移动端 App</text>
    </g>
    
    <g transform="translate(520, 95)">
      <rect x="0" y="0" width="160" height="50" rx="6" fill="#e67e22" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">小程序</text>
    </g>
    
    <g transform="translate(720, 95)">
      <rect x="0" y="0" width="160" height="50" rx="6" fill="#e74c3c" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">自助售票机</text>
    </g>
    
    <g transform="translate(920, 95)">
      <rect x="0" y="0" width="160" height="50" rx="6" fill="#1abc9c" filter="url(#shadow)"/>
      <text x="80" y="30" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">客服系统</text>
    </g>
  </g>
  
  <!-- ========== 第2层：应用层 ========== -->
  <g>
    <text x="100" y="210" font-size="16" font-weight="bold" fill="#2ecc71">② 应用层 (Application Layer)</text>
    <rect x="100" y="220" width="1000" height="150" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    
    <g transform="translate(120, 240)">
      <rect x="0" y="0" width="180" height="115" rx="8" fill="#ffffff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">用户服务</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">注册登录</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">身份认证</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">个人信息</text>
      <text x="90" y="100" text-anchor="middle" font-size="10" fill="#666666">订单管理</text>
    </g>
    
    <g transform="translate(380, 240)">
      <rect x="0" y="0" width="180" height="115" rx="8" fill="#ffffff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">车票服务</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">余票查询</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">票价计算</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">座位选择</text>
      <text x="90" y="100" text-anchor="middle" font-size="10" fill="#666666">票务规则</text>
    </g>
    
    <g transform="translate(640, 240)">
      <rect x="0" y="0" width="180" height="115" rx="8" fill="#ffffff" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">订单服务</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">订单创建</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">支付处理</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">退改签</text>
      <text x="90" y="100" text-anchor="middle" font-size="10" fill="#666666">订单状态</text>
    </g>
    
    <g transform="translate(900, 240)">
      <rect x="0" y="0" width="180" height="115" rx="8" fill="#ffffff" stroke="#1abc9c" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">支付服务</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">支付接口</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">退款处理</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">对账结算</text>
      <text x="90" y="100" text-anchor="middle" font-size="10" fill="#666666">支付安全</text>
    </g>
  </g>
  
  <!-- ========== 第3层：业务逻辑层 ========== -->
  <g>
    <text x="100" y="420" font-size="16" font-weight="bold" fill="#e74c3c">③ 业务逻辑层 (Business Logic Layer)</text>
    <rect x="100" y="430" width="1000" height="120" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    
    <g transform="translate(120, 450)">
      <rect x="0" y="0" width="180" height="85" rx="8" fill="#ffffff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">库存管理</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">余票锁定</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">库存释放</text>
    </g>
    
    <g transform="translate(380, 450)">
      <rect x="0" y="0" width="180" height="85" rx="8" fill="#ffffff" stroke="#1abc9c" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">票价策略</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">动态定价</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">折扣计算</text>
    </g>
    
    <g transform="translate(640, 450)">
      <rect x="0" y="0" width="180" height="85" rx="8" fill="#ffffff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">规则引擎</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">退改签规则</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">购票限制</text>
    </g>
    
    <g transform="translate(900, 450)">
      <rect x="0" y="0" width="180" height="85" rx="8" fill="#ffffff" stroke="#34495e" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">风控系统</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">反黄牛</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">异常检测</text>
    </g>
  </g>
  
  <!-- ========== 第4层：数据访问层 ========== -->
  <g>
    <text x="100" y="600" font-size="16" font-weight="bold" fill="#95a5a6">④ 数据访问层 (Data Access Layer)</text>
    <rect x="100" y="610" width="1000" height="130" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    
    <g transform="translate(120, 630)">
      <rect x="0" y="0" width="180" height="95" rx="8" fill="#ffffff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Redis 集群</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">余票缓存</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">分布式锁</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">会话管理</text>
    </g>
    
    <g transform="translate(380, 630)">
      <rect x="0" y="0" width="180" height="95" rx="8" fill="#ffffff" stroke="#1abc9c" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">MySQL 主从</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">用户数据</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">订单数据</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">车次信息</text>
    </g>
    
    <g transform="translate(640, 630)">
      <rect x="0" y="0" width="180" height="95" rx="8" fill="#ffffff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">MongoDB</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">日志存储</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">操作记录</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">历史查询</text>
    </g>
    
    <g transform="translate(900, 630)">
      <rect x="0" y="0" width="180" height="95" rx="8" fill="#ffffff" stroke="#34495e" stroke-width="2" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">Elasticsearch</text>
      <line x1="20" y1="35" x2="160" y2="35" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="55" text-anchor="middle" font-size="10" fill="#666666">车次搜索</text>
      <text x="90" y="70" text-anchor="middle" font-size="10" fill="#666666">日志分析</text>
      <text x="90" y="85" text-anchor="middle" font-size="10" fill="#666666">实时统计</text>
    </g>
  </g>
  
  <!-- ========== 右侧：核心技术点 ========== -->
  <g transform="translate(900, 770)">
    <rect x="0" y="0" width="280" height="100" rx="10" fill="#ffffff" stroke="#f39c12" stroke-width="2"/>
    <text x="140" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#f39c12">核心技术</text>
    <line x1="20" y1="30" x2="260" y2="30" stroke="#f39c12" stroke-width="1"/>
    
    <text x="30" y="50" font-size="10" fill="#e74c3c">●</text>
    <text x="40" y="50" font-size="10" fill="#666666">分布式锁</text>
    <text x="30" y="65" font-size="10" fill="#666666">Redis SETNX 库存锁定</text>
    
    <text x="150" y="50" font-size="10" fill="#9b59b6">●</text>
    <text x="160" y="50" font-size="10" fill="#666666">消息队列</text>
    <text x="150" y="65" font-size="10" fill="#666666">异步订单处理</text>
    
    <text x="30" y="85" font-size="10" fill="#e67e22">●</text>
    <text x="40" y="85" font-size="10" fill="#666666">缓存策略</text>
    <text x="30" y="100" font-size="10" fill="#666666">多级缓存架构</text>
  </g>
  
  <!-- ========== 底部：架构特点 ========== -->
  <g transform="translate(100, 770)">
    <rect x="0" y="0" width="780" height="100" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="390" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#333333">架构特点</text>
    <line x1="20" y1="30" x2="760" y2="30" stroke="#e0e0e0" stroke-width="1"/>
    
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-size="10" font-weight="bold" fill="#e74c3c">高并发：</text>
      <text x="60" y="0" font-size="10" fill="#666666">分布式锁 + 缓存预热 + 异步处理</text>
    </g>
    
    <g transform="translate(20, 65)">
      <text x="0" y="0" font-size="10" font-weight="bold" fill="#2ecc71">高可用：</text>
      <text x="60" y="0" font-size="10" fill="#666666">服务熔断 + 降级策略 + 集群部署</text>
    </g>
    
    <g transform="translate(20, 85)">
      <text x="0" y="0" font-size="10" font-weight="bold" fill="#3498db">可扩展：</text>
      <text x="60" y="0" font-size="10" fill="#666666">微服务架构 + 水平扩展 + 容器化</text>
    </g>
  </g>
</svg>