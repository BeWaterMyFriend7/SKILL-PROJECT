<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1000" viewBox="0 0 900 1000">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#999999"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#3498db"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <rect width="900" height="1000" fill="#f8f9fa"/>
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#333333">复杂流程图示例：用户登录验证系统</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#999999">包含分支、折线、虚线、条件判断等复杂元素</text>
  
  <!-- 开始节点 -->
  <g transform="translate(380, 80)">
    <rect width="140" height="50" rx="8" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">用户发起登录</text>
  </g>
  
  <!-- 箭头到验证 -->
  <line x1="450" y1="130" x2="450" y2="158" stroke="#999999" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 验证节点（菱形判断） -->
  <g transform="translate(380, 160)">
    <polygon points="70,0 140,25 70,50 0,25" 
             fill="#fff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">验证输入格式</text>
  </g>
  
  <!-- 分支：格式验证结果 -->
  <!-- 左侧分支：格式错误 -->
  <path d="M 450 210 L 450 240 L 250 240 L 250 290" 
        fill="none" stroke="#e74c3c" stroke-width="2"
        marker-end="url(#arrowhead-red)"/>
  <text x="350" y="235" text-anchor="middle" font-size="11" fill="#e74c3c">格式错误</text>
  
  <!-- 格式错误处理节点 -->
  <g transform="translate(180, 290)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">返回错误提示</text>
  </g>
  
  <!-- 右侧分支：格式正确 -->
  <path d="M 450 210 L 450 240 L 650 240 L 650 290" 
        fill="none" stroke="#2ecc71" stroke-width="2" 
        marker-end="url(#arrowhead)"/>
  <text x="550" y="235" text-anchor="middle" font-size="11" fill="#2ecc71">格式正确</text>
  
  <!-- 格式正确：检查用户是否存在 -->
  <g transform="translate(580, 290)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">查询用户信息</text>
  </g>
  
  <!-- 箭头到用户检查结果判断 -->
  <line x1="650" y1="335" x2="650" y2="360" stroke="#999999" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 用户存在判断（菱形） -->
  <g transform="translate(580, 365)">
    <polygon points="70,0 140,25 70,50 0,25" 
             fill="#fff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="28" text-anchor="middle" font-size="12" fill="#333">用户是否存在?</text>
  </g>
  
  <!-- 分支：用户不存在 -->
  <path d="M 650 415 L 650 445 L 500 445 L 500 490" 
        fill="none" stroke="#e74c3c" stroke-width="2"
        marker-end="url(#arrowhead-red)"/>
  <text x="575" y="440" text-anchor="middle" font-size="11" fill="#e74c3c">用户不存在</text>
  
  <!-- 用户不存在处理 -->
  <g transform="translate(430, 490)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">注册或提示</text>
  </g>
  
  <!-- 分支：用户存在 -->
  <path d="M 650 415 L 650 445 L 800 445 L 800 490" 
        fill="none" stroke="#2ecc71" stroke-width="2" 
        marker-end="url(#arrowhead)"/>
  <text x="725" y="440" text-anchor="middle" font-size="11" fill="#2ecc71">用户存在</text>
  
  <!-- 用户存在：密码验证 -->
  <g transform="translate(730, 490)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">密码验证</text>
  </g>
  
  <!-- 箭头到密码验证结果判断 -->
  <line x1="800" y1="535" x2="800" y2="560" stroke="#999999" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 密码验证判断（菱形） -->
  <g transform="translate(730, 565)">
    <polygon points="70,0 140,25 70,50 0,25" 
             fill="#fff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="28" text-anchor="middle" font-size="12" fill="#333">密码正确?</text>
  </g>
  
  <!-- 分支：密码错误 -->
  <path d="M 800 615 L 800 645 L 650 645 L 650 690" 
        fill="none" stroke="#e74c3c" stroke-width="2"
        marker-end="url(#arrowhead-red)"/>
  <text x="725" y="640" text-anchor="middle" font-size="11" fill="#e74c3c">密码错误</text>
  
  <!-- 密码错误处理（虚线框可选区域） -->
  <rect x="600" y="680" width="100" height="60" rx="8" 
        fill="none" stroke="#999999" stroke-width="1" stroke-dasharray="5,5"/>
  <text x="650" y="695" text-anchor="middle" font-size="10" fill="#999">可选操作</text>
  <text x="650" y="710" text-anchor="middle" font-size="9" fill="#999">1. 重试</text>
  <text x="650" y="725" text-anchor="middle" font-size="9" fill="#999">2. 找回密码</text>
  
  <!-- 分支：密码正确 -->
  <path d="M 800 615 L 870 615 L 870 690" 
        fill="none" stroke="#2ecc71" stroke-width="2" 
        marker-end="url(#arrowhead)"/>
  <text x="835" y="640" text-anchor="middle" font-size="11" fill="#2ecc71">密码正确</text>
  
  <!-- 密码正确：登录成功 -->
  <g transform="translate(730, 690)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#2ecc71" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">登录成功</text>
  </g>
  
  <!-- 登录成功后的异步操作（虚线） -->
  <line x1="800" y1="735" x2="800" y2="770" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-blue)"/>
  
  <!-- 异步操作 -->
  <g transform="translate(730, 775)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#9b59b6" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">异步日志记录</text>
  </g>
  
  <!-- 汇聚点：所有流程最终汇聚 -->
  <circle cx="450" cy="780" r="8" fill="#666"/>
  <text x="470" y="785" font-size="10" fill="#666">汇聚点</text>
  
  <!-- 从格式错误到汇聚点 -->
  <path d="M 250 335 L 250 780 L 450 780" 
        fill="none" stroke="#e74c3c" stroke-width="1"/>
  
  <!-- 从用户不存在到汇聚点 -->
  <path d="M 500 535 L 500 780 L 450 780" 
        fill="none" stroke="#e74c3c" stroke-width="1"/>
  
  <!-- 从密码错误可选操作到汇聚点 -->
  <path d="M 650 740 L 650 780 L 450 780" 
        fill="none" stroke="#999999" stroke-width="1"/>
  
  <!-- 从异步日志记录到汇聚点 -->
  <path d="M 800 820 L 800 780 L 450 780" 
        fill="none" stroke="#9b59b6" stroke-width="1"/>
  
  <!-- 从汇聚点到结束 -->
  <line x1="450" y1="788" x2="450" y2="820" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 结束节点 -->
  <g transform="translate(380, 820)">
    <rect width="140" height="45" rx="8" fill="#fff" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="25" text-anchor="middle" font-size="12" fill="#333">流程结束</text>
  </g>
  
  <!-- 图例说明 -->
  <g transform="translate(50, 830)">
    <rect width="200" height="150" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">图例说明</text>
    
    <!-- 实线 -->
    <line x1="20" y1="40" x2="50" y2="40" stroke="#999999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="60" y="45" font-size="10" fill="#666">主线流程</text>
    
    <!-- 错误分支（实线） -->
    <line x1="20" y1="60" x2="50" y2="60" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/>
    <text x="60" y="65" font-size="10" fill="#666">错误分支</text>
    
    <!-- 折线 -->
    <path d="M 20 80 L 35 80 L 35 90 L 50 90" fill="none" stroke="#999999" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="60" y="95" font-size="10" fill="#666">折线连接</text>
    
    <!-- 菱形 -->
    <polygon points="30,110 45,120 30,130 15,120" fill="#fff" stroke="#e67e22" stroke-width="1"/>
    <text x="60" y="125" font-size="10" fill="#666">条件判断</text>
    
    <!-- 虚线框 -->
    <rect x="15" y="135" width="30" height="18" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="60" y="150" font-size="10" fill="#666">可选区域</text>
  </g>
  

</svg>