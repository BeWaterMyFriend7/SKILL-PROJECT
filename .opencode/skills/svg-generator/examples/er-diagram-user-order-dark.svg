<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <!-- 深色模式样式 -->
    <style>
      .entity { fill: #16213e; stroke: #bb86fc; stroke-width: 2; }
      .attribute { fill: #1a1a2e; stroke: #666666; stroke-width: 1; }
      .relationship { fill: #16213e; stroke: #03dac6; stroke-width: 2; }
      .text { fill: #ffffff; font-family: "Microsoft YaHei", sans-serif; }
      .pk { font-weight: bold; }
      .fk { font-style: italic; }
      .connector { stroke: #666666; stroke-width: 2; fill: none; }
    </style>
  </defs>
  
  <!-- 背景 - 深色模式 -->
  <rect width="900" height="500" fill="#1a1a2e"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">用户订单系统ER图</text>
  
  <!-- 用户实体 -->
  <g class="entity" transform="translate(100, 100)">
    <rect x="0" y="0" width="200" height="120" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text pk">用户 (User)</text>
    <rect x="20" y="40" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="58" text-anchor="middle" class="text">+ id: int (PK)</text>
    <rect x="20" y="75" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="93" text-anchor="middle" class="text">+ username: varchar(50)</text>
    <rect x="20" y="110" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="128" text-anchor="middle" class="text">+ email: varchar(100)</text>
  </g>
  
  <!-- 订单实体 -->
  <g class="entity" transform="translate(400, 100)">
    <rect x="0" y="0" width="200" height="140" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text pk">订单 (Order)</text>
    <rect x="20" y="40" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="58" text-anchor="middle" class="text">+ order_id: int (PK)</text>
    <rect x="20" y="75" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="93" text-anchor="middle" class="text">+ order_date: datetime</text>
    <rect x="20" y="110" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="128" text-anchor="middle" class="text">+ total_amount: decimal(10,2)</text>
    <rect x="20" y="145" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="163" text-anchor="middle" class="text fk">+ user_id: int (FK)</text>
  </g>
  
  <!-- 订单项实体 -->
  <g class="entity" transform="translate(700, 100)">
    <rect x="0" y="0" width="200" height="140" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text pk">订单项 (OrderItem)</text>
    <rect x="20" y="40" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="58" text-anchor="middle" class="text">+ item_id: int (PK)</text>
    <rect x="20" y="75" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="93" text-anchor="middle" class="text">+ quantity: int</text>
    <rect x="20" y="110" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="128" text-anchor="middle" class="text">+ unit_price: decimal(10,2)</text>
    <rect x="20" y="180" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="198" text-anchor="middle" class="text fk">+ product_id: int (FK)</text>
  </g>
  
  <!-- 产品实体 -->
  <g class="entity" transform="translate(550, 300)">
    <rect x="0" y="0" width="200" height="100" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="text pk">产品 (Product)</text>
    <rect x="20" y="40" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="58" text-anchor="middle" class="text">+ product_id: int (PK)</text>
    <rect x="20" y="75" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="93" text-anchor="middle" class="text">+ name: varchar(100)</text>
    <rect x="20" y="110" width="160" height="25" rx="4" class="attribute"/>
    <text x="100" y="128" text-anchor="middle" class="text">+ price: decimal(10,2)</text>
  </g>
  
  <!-- 拥有关系 (User-Order) -->
  <g class="relationship" transform="translate(250, 220)">
    <polygon points="0,-20 40,0 0,20 -40,0"/>
    <text x="0" y="5" text-anchor="middle" class="text">下单</text>
  </g>
  
  <!-- 包含关系 (Order-OrderItem) -->
  <g class="relationship" transform="translate(550, 220)">
    <polygon points="0,-20 40,0 0,20 -40,0"/>
    <text x="0" y="5" text-anchor="middle" class="text">包含</text>
  </g>
  
  <!-- 关联关系 (OrderItem-Product) -->
  <g class="relationship" transform="translate(750, 220)">
    <polygon points="0,-20 40,0 0,20 -40,0"/>
    <text x="0" y="5" text-anchor="middle" class="text">关联</text>
  </g>
  
  <!-- 连接线 -->
  <!-- 用户-下单-订单 -->
  <line x1="200" y1="160" x2="210" y2="200" class="connector"/>
  <line x1="210" y1="200" x2="290" y2="200" class="connector"/>
  <line x1="290" y1="200" x3="300" y2="180" class="connector"/>
  <line x1="290" y1="200" x3="300" y2="220" class="connector"/>
  
  <!-- 订单-包含-订单项 -->
  <line x1="500" y1="160" x2="510" y2="200" class="connector"/>
  <line x1="510" y1="200" x2="540" y2="200" class="connector"/>
  <line x1="540" y1="200" x3="550" y2="180" class="connector"/>
  <line x1="540" y1="200" x3="550" y2="220" class="connector"/>
  
  <!-- 订单项-关联-产品 -->
  <line x1="800" y1="160" x2="790" y2="200" class="connector"/>
  <line x1="790" y1="200" x2="760" y2="200" class="connector"/>
  <line x1="760" y1="200" x3="750" y2="180" class="connector"/>
  <line x1="760" y1="200" x3="750" y2="220" class="connector"/>
  
  <!-- 基数标注 -->
  <text x="250" y="170" text-anchor="middle" class="text" font-size="10">1</text>
  <text x="250" y="230" text-anchor="middle" class="text" font-size="10">N</text>
  
  <text x="525" y="170" text-anchor="middle" class="text" font-size="10">1</text>
  <text x="525" y="230" text-anchor="middle" class="text" font-size="10">N</text>
  
  <text x="775" y="170" text-anchor="middle" class="text" font-size="10">N</text>
  <text x="775" y="230" text-anchor="middle" class="text" font-size="10">1</text>
</svg>