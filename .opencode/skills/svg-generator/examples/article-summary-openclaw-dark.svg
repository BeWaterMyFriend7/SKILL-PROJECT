<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowhead" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 5 2.5, 0 5" fill="#666"/>
    </marker>
  </defs>
  
  <rect width="800" height="500" fill="#1a1a2e"/>
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff">微信接入 OpenClaw 教程</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#888888">10分钟实现微信对话 OpenClaw</text>
  
  <!-- 步骤1：准备 WorkBuddy -->
  <g transform="translate(80, 90)">
    <rect width="160" height="100" rx="5" fill="#16213e" stroke="#3498db" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="28" rx="5" fill="#3498db"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Step 1</text>
    <text x="80" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">准备工具</text>
    <text x="80" y="75" text-anchor="middle" font-size="10" fill="#aaaaaa">下载安装 WorkBuddy</text>
    <text x="80" y="90" text-anchor="middle" font-size="9" fill="#888888">注意选 WorkBuddy</text>
  </g>
  
  <!-- 箭头1 -->
  <line x1="250" y1="140" x2="290" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 步骤2：安装登录 -->
  <g transform="translate(300, 90)">
    <rect width="160" height="100" rx="5" fill="#16213e" stroke="#2ecc71" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="28" rx="5" fill="#2ecc71"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Step 2</text>
    <text x="80" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">安装登录</text>
    <text x="80" y="75" text-anchor="middle" font-size="10" fill="#aaaaaa">安装并登录账号</text>
    <text x="80" y="90" text-anchor="middle" font-size="9" fill="#888888">选择账号完成登录</text>
  </g>
  
  <!-- 箭头2 -->
  <line x1="470" y1="140" x2="510" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 步骤3：配置环境 -->
  <g transform="translate(520, 90)">
    <rect width="160" height="100" rx="5" fill="#16213e" stroke="#e67e22" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="28" rx="5" fill="#e67e22"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Step 3</text>
    <text x="80" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">配置环境</text>
    <text x="80" y="75" text-anchor="middle" font-size="10" fill="#aaaaaa">进入 Claw 设置</text>
    <text x="80" y="90" text-anchor="middle" font-size="9" fill="#888888">绑定微信客服号</text>
  </g>
  
  <!-- 步骤4：开始使用 -->
  <g transform="translate(300, 220)">
    <rect width="160" height="100" rx="5" fill="#16213e" stroke="#9b59b6" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="28" rx="5" fill="#9b59b6"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Step 4</text>
    <text x="80" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">开始使用</text>
    <text x="80" y="75" text-anchor="middle" font-size="10" fill="#aaaaaa">微信直接对话</text>
    <text x="80" y="90" text-anchor="middle" font-size="9" fill="#888888">发送消息即可聊天</text>
  </g>
  
  <!-- 注意事项 -->
  <g transform="translate(80, 360)">
    <rect width="640" height="110" rx="5" fill="#16213e" stroke="#333333" stroke-width="1"/>
    <text x="30" y="25" font-size="12" font-weight="bold" fill="#ffffff">⚠️ 注意事项</text>
    <text x="30" y="50" font-size="10" fill="#aaaaaa">• 下载时选择「WorkBuddy」，不是 CodeBuddy</text>
    <text x="30" y="70" font-size="10" fill="#aaaaaa">• 安装时建议全选附加任务，后续可右键快速打开</text>
    <text x="30" y="90" font-size="10" fill="#aaaaaa">• 绑定后可直接在微信发送消息与 OpenClaw 对话</text>
  </g>
  
  <!-- 底部信息 -->
  <text x="400" y="495" text-anchor="middle" font-size="9" fill="#888888">来源：Datawhale · 作者：筱可</text>
</svg>